{% extends "base.html" %}
{% block title %}登入 - AntiMoney{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="glass-card p-5 text-center">
            <h2 class="mb-4 brand-font text-primary">歡迎回來</h2>
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3 text-start">
                    <label for="email" class="form-label text-muted">電子信箱</label>
                    <input type="email" class="form-control form-control-lg" id="email" name="email" required placeholder="name@example.com">
                </div>
                <div class="mb-4 text-start">
                    <label for="password" class="form-label text-muted">密碼</label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password" required placeholder="•••••••••">
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 py-2 fs-5 mb-3"><i class="bi bi-box-arrow-in-right me-2"></i>登入</button>
                <div class="mt-3">
                    <span class="text-muted">還沒有帳號嗎？</span> 
                    <a href="{{ url_for('auth.register') }}" class="text-primary text-decoration-none fw-bold">立即註冊</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
